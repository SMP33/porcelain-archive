<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив Документов</title>
    <div id="styles-placeholder"></div>
    <style>[v-cloak] { display: none; }</style>
  </head>
  <body>
    <div id="app" v-cloak>
      <v-app>
        <v-layout>
          <div id="toolbar-placeholder"></div>
    
          <v-main>
            <v-container>
              <v-card>
                <v-card-title class="d-flex justify-space-between align-center">
                  <span>Документы</span>
                  <v-btn v-if="user" color="primary" @click="showCreateDialog = true">Добавить документ</v-btn>
                </v-card-title>
                <v-card-text>
                  <!-- Контент страницы списка документов -->
                  <v-data-table-server v-model:items-per-page="itemsPerPage" :headers="headers"
                    :items-length="totalItems" :items="serverItems" :loading="loading" :items-per-page-options="[
                      { value: 25, title: '25' },
                      { value: 50, title: '50' },
                      { value: 100, title: '100' },
                      { value: 500, title: '500' },
                    ]" class="elevation-1" item-value="name" @update:options="loadItems"
                    @click:row="openDocument"></v-data-table-server>
                </v-card-text>
              </v-card>
            </v-container>
          </v-main>
        </v-layout>

        <v-dialog v-model="showCreateDialog" max-width="500">
          <v-card>
            <v-card-title>Новый документ</v-card-title>
            <v-card-text>
              <v-text-field
                v-model="newDocumentName"
                label="Название документа"
                autofocus
                @keyup.enter="handleCreateDocument"
              ></v-text-field>
              <v-alert v-if="createError" type="error" density="compact">{{ createError }}</v-alert>
            </v-card-text>
            <v-card-actions>
              <v-spacer></v-spacer>
              <v-btn @click="showCreateDialog = false">Отмена</v-btn>
              <v-btn color="primary" :loading="creating" @click="handleCreateDocument">Создать</v-btn>
            </v-card-actions>
          </v-card>
        </v-dialog>
      </v-app>
    </div>

    <!-- Подключение скриптов Vue, Vuetify и Axios -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3/dist/vuetify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
      // Функция для загрузки HTML-фрагментов
      async function loadFragments() {
        const fragments = {
          '#styles-placeholder': '/static/_styles.html',
          '#toolbar-placeholder': '/static/_toolbar.html'
          // '#scripts-placeholder' больше не нужен
        };
        for (const placeholder in fragments) {
          const response = await fetch(fragments[placeholder], { cache: 'no-store' });
          const html = await response.text();
          document.querySelector(placeholder).outerHTML = html;
        }
      }

      // Загружаем фрагменты, затем инициализируем Vue
      loadFragments().then(() => {
        const { createApp, ref, onMounted } = Vue;
        const { createVuetify } = Vuetify;

        const vuetify = createVuetify();

        const app = createApp({
          setup() {
            const API_URL = 'http://127.0.0.1:8000';
            const user = ref(null); // Данные о пользователе

            const itemsPerPage = ref(25);
            const headers = ref([
              { title: 'ID', align: 'start', sortable: false, key: 'id' },
              { title: 'Название документа', key: 'name', align: 'end' },
              { title: 'Автор', key: 'author', align: 'end' },
              { title: 'Дата создания', key: 'created_at', align: 'end' },
            ]);

            const serverItems = ref([]);
            const loading = ref(true);
            const totalItems = ref(0);

            const showCreateDialog = ref(false);
            const newDocumentName = ref('');
            const creating = ref(false);
            const createError = ref('');

            const showResetPasswordDialog = ref(false);
            const oldPassword = ref('');
            const newPassword = ref('');
            const resetPasswordLoading = ref(false);
            const resetPasswordError = ref('');

            const showSetDisplayNameDialog = ref(false);
            const displayNameInput = ref('');
            const setDisplayNameLoading = ref(false);
            const setDisplayNameError = ref('');

            const loadItems = async ({ page, itemsPerPage, sortBy }) => {
              loading.value = true;
              try {
                const offset = (page - 1) * itemsPerPage;
                const response = await axios.get(`${API_URL}/api/documents`, {
                  params: { offset, limit: itemsPerPage },
                  withCredentials: true // Важно для отправки cookie
                });
                serverItems.value = response.data.items;
                totalItems.value = response.data.total;
              } catch (error) {
                if (error.response && error.response.status === 401) {
                  // Если сессия недействительна, можно перенаправить на логин
                }
                console.error("Ошибка при загрузке документов:", error);
              } finally {
                loading.value = false;
              }
            };

            const openDocument = (event, { item }) => {
              // Переходим на страницу документа, передавая его ID
              window.location.href = `/document/${item.id}`;
            };

            const goHome = () => {
              window.location.href = '/';
            };

            const handleCreateDocument = async () => {
              if (!newDocumentName.value) {
                return;
              }
              creating.value = true;
              createError.value = '';
              try {
                const response = await axios.post(
                  '/api/documents/create',
                  { name: newDocumentName.value },
                  { withCredentials: true }
                );
                window.location.href = `/document/${response.data.id}`;
              } catch (error) {
                createError.value = 'Не удалось создать документ.';
                console.error("Ошибка при создании документа:", error);
              } finally {
                creating.value = false;
              }
            };

            const checkAuth = async () => {
              try {
                // Проверяем, есть ли активная сессия
                const response = await axios.get('/api/users/me', { withCredentials: true });
                user.value = response.data;
              } catch (error) {
                user.value = null;
                console.log("Пользователь не авторизован.");
              }
            };

            const handleLogout = async () => {
              try {
                await axios.post('/api/users/logout', {}, { withCredentials: true });
                user.value = null;
                window.location.reload(); // Перезагружаем страницу
              } catch (error) {
                console.error("Ошибка при выходе:", error);
              }
            };

            const handleResetPassword = async () => {
              resetPasswordLoading.value = true;
              resetPasswordError.value = '';
              try {
                await axios.post(
                  '/api/users/reset_password',
                  { old_password: oldPassword.value, new_password: newPassword.value },
                  { withCredentials: true }
                );
                showResetPasswordDialog.value = false;
                oldPassword.value = '';
                newPassword.value = '';
              } catch (error) {
                resetPasswordError.value = 'Не удалось сменить пароль.';
                console.error("Ошибка при смене пароля:", error);
              } finally {
                resetPasswordLoading.value = false;
              }
            };

            const handleSetDisplayName = async () => {
              setDisplayNameLoading.value = true;
              setDisplayNameError.value = '';
              try {
                const response = await axios.post(
                  '/api/users/set_display_name',
                  { display_name: displayNameInput.value },
                  { withCredentials: true }
                );
                if (user.value) {
                  user.value.display_name = response.data.display_name;
                }
                showSetDisplayNameDialog.value = false;
              } catch (error) {
                setDisplayNameError.value = 'Не удалось изменить ФИО.';
                console.error("Ошибка при изменении ФИО:", error);
              } finally {
                setDisplayNameLoading.value = false;
              }
            };

            onMounted(checkAuth);

            return {
              user, itemsPerPage, headers, serverItems, loading, totalItems, loadItems, openDocument, handleLogout,
              showCreateDialog, newDocumentName, creating, createError, handleCreateDocument, goHome,
              showResetPasswordDialog, oldPassword, newPassword, resetPasswordLoading, resetPasswordError, handleResetPassword,
              showSetDisplayNameDialog, displayNameInput, setDisplayNameLoading, setDisplayNameError, handleSetDisplayName,
            };
          }
        });

        app.use(vuetify).mount('#app');
      });
    </script>
  </body>
</html>
