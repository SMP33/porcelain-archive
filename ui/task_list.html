<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список задач</title>
    <div id="styles-placeholder"></div>
    <style>
      [v-cloak] { display: none; }
      .log-scroll-area {
        max-height: 500px;
        overflow-y: auto;
        background-color: #333;
        border-radius: 4px;
      }
      .log-text {
        margin: 0;
        padding: 12px;
        color: #fff;
        background-color: #333;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div id="app" v-cloak>
      <v-app>
        <v-layout>
          <div id="toolbar-placeholder"></div>

          <v-main>
            <v-container fluid>
              <v-row>
                <v-col :cols="selectedTask ? 4 : 12">
                  <v-card>
                    <v-card-title>Задачи</v-card-title>
                    <v-card-text>
                      <v-data-table-server
                        v-model:page="page"
                        v-model:items-per-page="itemsPerPage"
                        :headers="headers"
                        :items-length="totalItems"
                        :items="serverItems"
                        :loading="loading"
                        :items-per-page-options="[
                          { value: 25, title: '25' },
                          { value: 50, title: '50' },
                          { value: 100, title: '100' },
                          { value: 500, title: '500' },
                        ]"
                        class="elevation-1"
                        item-value="id"
                        @update:options="loadItems"
                        @click:row="selectTask"
                      >
                        <template v-slot:item.type="{ item }">{{ taskTypeLabel(item.type) }}</template>
                        <template v-slot:item.status="{ item }">
                          <v-chip :color="statusColor(item.status)" size="small" label>{{ statusLabel(item.status) }}</v-chip>
                        </template>
                      </v-data-table-server>
                    </v-card-text>
                  </v-card>
                </v-col>

                <v-col v-if="selectedTask" cols="8">
                  <v-card>
                    <v-card-title class="d-flex justify-space-between align-center">
                      <span>Данные задачи №{{ selectedTask.id }}</span>
                      <v-btn icon variant="text" @click="selectedTask = null">
                        <v-icon>mdi-close</v-icon>
                      </v-btn>
                    </v-card-title>
                    <v-card-text>
                      <pre class="text-body-2">{{ JSON.stringify(selectedTask.data, null, 2) }}</pre>

                      <v-divider class="my-4"></v-divider>

                      <div class="text-subtitle-2 mb-2">Лог</div>
                      <v-progress-circular v-if="taskLogLoading" indeterminate size="20"></v-progress-circular>
                      <div v-else class="log-scroll-area">
                        <pre class="log-text">{{ taskLog || "Лог пуст" }}</pre>
                      </div>
                    </v-card-text>
                  </v-card>
                </v-col>
              </v-row>
            </v-container>
          </v-main>
        </v-layout>
      </v-app>
    </div>

    <!-- Подключение скриптов Vue, Vuetify и Axios -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3/dist/vuetify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
      // Функция для загрузки HTML-фрагментов
      async function loadFragments() {
        const fragments = {
          '#styles-placeholder': '/static/_styles.html',
          '#toolbar-placeholder': '/static/_toolbar.html'
        };
        for (const placeholder in fragments) {
          const response = await fetch(fragments[placeholder], { cache: 'no-store' });
          const html = await response.text();
          document.querySelector(placeholder).outerHTML = html;
        }
      }

      loadFragments().then(() => {
        const { createApp, ref } = Vue;
        const { createVuetify } = Vuetify;

        const vuetify = createVuetify();

        const app = createApp({
          setup() {
            const user = ref(null);

            const pageDocumentName = ref(null);
            const pageBranchName = ref(null);

            const page = ref(1);
            const itemsPerPage = ref(25);
            const headers = ref([
              { title: 'ID', align: 'start', sortable: false, key: 'id' },
              { title: 'Тип', key: 'type', align: 'end' },
              { title: 'Статус', key: 'status', align: 'end' },
            ]);

            const serverItems = ref([]);
            const loading = ref(true);
            const totalItems = ref(0);
            const selectedTask = ref(null);
            const taskLog = ref('');
            const taskLogLoading = ref(false);

            const statusColor = (status) => {
              switch (status) {
                case 'success': return 'green';
                case 'error': return 'red';
                case 'running': return 'blue';
                case 'queued':
                case 'new':
                default: return 'grey';
              }
            };

            const TASK_TYPE_LABELS = {
              create_repos: 'Создать документ',
              create_branch: 'Начать правки',
              insert_files: 'Добавить страницы',
              remove_files: 'Удалить страницы',
              set_text: 'Задать текст',
              reset_text: 'Убрать текст',
              merge_branch: 'Завершить правки',
            };
            const taskTypeLabel = (type) => TASK_TYPE_LABELS[type] || type;

            const STATUS_LABELS = {
              new: 'Создается',
              queued: 'Ожидает',
              running: 'В процессе',
              success: 'Готово',
              error: 'Ошибка',
            };
            const statusLabel = (status) => STATUS_LABELS[status] || status;

            let lastTableOptions = { page: 1, itemsPerPage: itemsPerPage.value };
            let hasAutoSelected = false;

            const loadItems = async (options) => {
              lastTableOptions = options;
              const { page, itemsPerPage } = options;
              loading.value = true;
              try {
                const offset = (page - 1) * itemsPerPage;
                const response = await axios.get('/api/tasks/', {
                  params: { offset, limit: itemsPerPage },
                  withCredentials: true
                });
                serverItems.value = response.data.items;
                totalItems.value = response.data.total;

                if (!hasAutoSelected && serverItems.value.length) {
                  hasAutoSelected = true;
                  await selectTask(null, { item: serverItems.value[0] });
                }
              } catch (error) {
                console.error("Ошибка при загрузке задач:", error);
              } finally {
                loading.value = false;
              }
            };

            const refreshSelectedTaskLog = async () => {
              if (!selectedTask.value) return;
              try {
                const response = await axios.get(`/api/tasks/${selectedTask.value.id}/log`, { withCredentials: true });
                taskLog.value = response.data.log;
              } catch (error) {
                console.error("Ошибка при обновлении лога задачи:", error);
              }
            };

            const connectTaskUpdates = () => {
              const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
              const ws = new WebSocket(`${protocol}//${window.location.host}/api/tasks/ws`);

              ws.onmessage = async () => {
                const previousTotal = totalItems.value;
                await loadItems(lastTableOptions);

                if (totalItems.value > previousTotal) {
                  // Появилась новая задача - переключаемся на неё
                  page.value = 1;
                  await loadItems({ ...lastTableOptions, page: 1 });
                  selectedTask.value = serverItems.value[0];
                  await refreshSelectedTaskLog();
                  return;
                }

                if (selectedTask.value) {
                  const updated = serverItems.value.find((task) => task.id === selectedTask.value.id);
                  if (updated) {
                    selectedTask.value = updated;
                  }
                  await refreshSelectedTaskLog();
                }
              };

              ws.onclose = () => {
                setTimeout(connectTaskUpdates, 2000);
              };
            };

            const selectTask = async (event, { item }) => {
              selectedTask.value = item;
              taskLog.value = '';
              taskLogLoading.value = true;
              try {
                const response = await axios.get(`/api/tasks/${item.id}/log`, { withCredentials: true });
                taskLog.value = response.data.log;
              } catch (error) {
                console.error("Ошибка при загрузке лога задачи:", error);
              } finally {
                taskLogLoading.value = false;
              }
            };

            const goHome = () => {
              window.location.href = '/';
            };

            const checkAuth = async () => {
              try {
                const response = await axios.get('/api/users/me', { withCredentials: true });
                user.value = response.data;
              } catch (error) {
                user.value = null;
              }
            };

            const handleLogout = async () => {
              try {
                await axios.post('/api/users/logout', {}, { withCredentials: true });
                user.value = null;
                window.location.reload();
              } catch (error) {
                console.error("Ошибка при выходе:", error);
              }
            };

            const showResetPasswordDialog = ref(false);
            const oldPassword = ref('');
            const newPassword = ref('');
            const resetPasswordLoading = ref(false);
            const resetPasswordError = ref('');

            const handleResetPassword = async () => {
              resetPasswordLoading.value = true;
              resetPasswordError.value = '';
              try {
                await axios.post(
                  '/api/users/reset_password',
                  { old_password: oldPassword.value, new_password: newPassword.value },
                  { withCredentials: true }
                );
                showResetPasswordDialog.value = false;
                oldPassword.value = '';
                newPassword.value = '';
              } catch (error) {
                resetPasswordError.value = 'Не удалось сменить пароль.';
                console.error("Ошибка при смене пароля:", error);
              } finally {
                resetPasswordLoading.value = false;
              }
            };

            const showSetDisplayNameDialog = ref(false);
            const displayNameInput = ref('');
            const setDisplayNameLoading = ref(false);
            const setDisplayNameError = ref('');

            const handleSetDisplayName = async () => {
              setDisplayNameLoading.value = true;
              setDisplayNameError.value = '';
              try {
                const response = await axios.post(
                  '/api/users/set_display_name',
                  { display_name: displayNameInput.value },
                  { withCredentials: true }
                );
                if (user.value) {
                  user.value.display_name = response.data.display_name;
                }
                showSetDisplayNameDialog.value = false;
              } catch (error) {
                setDisplayNameError.value = 'Не удалось изменить ФИО.';
                console.error("Ошибка при изменении ФИО:", error);
              } finally {
                setDisplayNameLoading.value = false;
              }
            };

            checkAuth();
            connectTaskUpdates();

            return {
              user, pageDocumentName, pageBranchName, goHome, handleLogout,
              page, itemsPerPage, headers, serverItems, loading, totalItems, loadItems, statusColor, taskTypeLabel, statusLabel,
              selectedTask, selectTask, taskLog, taskLogLoading,
              showResetPasswordDialog, oldPassword, newPassword, resetPasswordLoading, resetPasswordError, handleResetPassword,
              showSetDisplayNameDialog, displayNameInput, setDisplayNameLoading, setDisplayNameError, handleSetDisplayName,
            };
          }
        });

        app.use(vuetify).mount('#app');
      });
    </script>
  </body>
</html>
